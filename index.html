
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>示例网页</title>
    <style>
        .navbar {
            background-color: #f1f1f1;
            padding: 10px;
        }
        .navbar a {
            text-decoration: none;
            margin-right: 10px;
            color: black;
        }
        .content {
            padding: 20px;
        }
        .category {
            border-bottom: 1px solid #ccc;
            margin-bottom: 20px;
        }
        .category h2 {
            font-weight: bold;
        }
        .category a {
            text-decoration: none;
            color: blue;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="#">首页</a>
        <a href="#">关于我们</a>
        <a href="#">联系我们</a>
    </div>
    <div class="content">
        <div class="category">
            <h2>分类一</h2>
            <a href="#">链接1</a><br>
            <a href="#">链接2</a><br>
            <a href="#">链接3</a>
        </div>
        <div class="category">
            <h2>分类二</h2>
            <a href="#">链接4</a><br>
            <a href="#">链接5</a><br>
            <a href="#">链接6</a>
        </div>
    </div>
</body>
</html>
