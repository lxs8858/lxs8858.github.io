
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航栏示例</title>
    <style>
        /* 设置导航栏为圆角样式 */
        nav {
            border-radius: 10px;
            overflow: hidden;
            background-color: #333;
        }

        /* 设置导航栏内的列表样式 */
        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        /* 设置导航栏内的列表项样式 */
        nav li {
            float: left;
        }

        /* 设置导航栏内的链接样式 */
        nav a {
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        /* 鼠标悬停在链接上时改变颜色 */
        nav a:hover {
            background-color: #111;
        }

        /* 设置下拉菜单的内容分类之间有分隔线 */
        li:not(:last-child) {
            border-right: 1px solid #bbb;
        }

        /* 分类标题行字体加粗 */
        .dropdown-content h3 {
            font-weight: bold;
        }

        /* 分类内容文字加链接 */
        .dropdown-content a {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#home">首页</a></li>
            <li class="dropdown">
                <a href="javascript:void(0)" class="dropbtn">分类</a>
                <div class="dropdown-content">
                    <h3>分类一</h3>
                    <a href="#">链接1</a>
                    <a href="#">链接2</a>
                    <a href="#">链接3</a>
                    <h3>分类二</h3>
                    <a href="#">链接4</a>
                    <a href="#">链接5</a>
                    <a href="#">链接6</a>
                </div>
            </li>
            <li><a href="#contact">联系我们</a></li>
        </ul>
    </nav>
</body>
</html>
