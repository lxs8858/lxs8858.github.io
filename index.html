
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>带导航栏的网页</title>
    <style>
        /* 导航栏样式 */
        .navbar {
            background-color: #333;
            overflow: hidden;
        }
        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }
        /* 分类内容样式 */
        .content {
            padding: 16px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div class="navbar">
        <a href="#home">首页</a>
        <a href="#news">新闻</a>
        <a href="#contact">联系我们</a>
        <a href="#about">关于我们</a>
    </div>

    <!-- 分类内容 -->
    <div class="content">
        <h1>欢迎来到我们的网站！</h1>
        <p>这里是一些分类内容：</p>
        <ul>
            <li>分类1</li>
            <li>分类2</li>
            <li>分类3</li>
        </ul>
    </div>
</body>
</html>
