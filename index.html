
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>免费分享</title>
    <style>
        /* 导航栏样式 */
        .navbar {
            background-color: #333;
            overflow: hidden;
        }

        /* 导航栏链接样式 */
        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        /* 下拉列表样式 */
        .dropdown {
            float: left;
            overflow: hidden;
        }

        /* 下拉按钮样式 */
        .dropdown .dropbtn {
            font-size: 16px;
            border: none;
            outline: none;
            color: white;
            padding: 14px 16px;
            background-color: inherit;
            font-family: inherit;
            margin: 0;
        }

        /* 下拉内容样式 */
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
        }

        /* 下拉内容链接样式 */
        .dropdown-content a {
            float: none;
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            text-align: left;
        }

        /* 鼠标悬停在下拉按钮上时显示下拉内容 */
        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* 分类标题行样式 */
        .category-title {
            font-weight: bold;
        }

        /* 分类内容文字链接样式 */
        .category-link {
            text-decoration: none;
            color: blue;
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <div class="navbar">
        <a href="#home">首页</a>
        <a href="#news">新闻</a>
        <div class="dropdown">
            <button class="dropbtn">下拉菜单
                <i class="fa fa-caret-down"></i>
            </button>
            <div class="dropdown-content">
                <a href="#">链接1</a>
                <a href="#">链接2</a>
                <a href="#">链接3</a>
            </div>
        </div>
    </div>

    <!-- 内容分类 -->
    <div class="content">
        <h2 class="category-title">分类1</h2>
        <p><a href="#" class="category-link">分类1内容1</a></p>
        <p><a href="#" class="category-link">分类1内容2</a></p>
        <hr>
        <h2 class="category-title">分类2</h2>
        <p><a href="#" class="category-link">分类2内容1</a></p>
        <p><a href="#" class="category-link">分类2内容2</a></p>
    </div>

</body>
</html>
