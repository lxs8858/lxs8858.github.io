
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航栏示例</title>
    <style>
        /* 导航栏样式 */
        .navbar {
            background-color: #333;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* 导航栏中的链接样式 */
        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        /* 鼠标悬停在链接上时改变颜色 */
        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }

        /* 分类标题行样式 */
        .category-title {
            font-weight: bold;
        }

        /* 分类内容文字链接样式 */
        .category-content a {
            text-decoration: none;
            color: blue;
        }

        /* 分类之间的分隔线样式 */
        hr {
            border: none;
            border-top: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div class="navbar">
        <a href="#home">首页</a>
        <a href="#news">新闻</a>
        <a href="#contact">联系我们</a>
        <a href="#about">关于我们</a>
    </div>

    <!-- 内容分类 -->
    <div class="category">
        <h2 class="category-title">分类一</h2>
        <p><a href="#">链接1</a></p>
        <p><a href="#">链接2</a></p>
        <hr>
        <h2 class="category-title">分类二</h2>
        <p><a href="#">链接3</a></p>
        <p><a href="#">链接4</a></p>
    </div>
</body>
</html>
