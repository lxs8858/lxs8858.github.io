
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航栏</title>
    <style>
        /* 导航栏样式 */
        .navbar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 50px;
            background-color: transparent; /* 无背景色 */
        }

        /* 导航链接样式 */
        .navbar a {
            text-decoration: none;
            color: #333;
            font-size: 18px;
        }

        /* 鼠标悬停时的效果 */
        .navbar a:hover {
            color: #007bff;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="#">首页</a>
        <a href="#">产品</a>
        <a href="#">关于我们</a>
        <a href="#">联系我们</a>
        <a href="#">首页</a>
        <a href="#">产品</a>
        <a href="#">关于我们</a>
        <a href="#">联系我们</a>
    </div>
</body>
</html>
